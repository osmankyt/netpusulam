<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPusula | Altyapı & Hız Testi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .glass-effect { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        #map { border-radius: 1.5rem; background: #0b1120; }
        .speedtest-frame { width: 100%; height: 600px; border: none; border-radius: 2rem; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans min-h-screen pb-20">

    <div class="max-w-6xl mx-auto pt-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-black text-white italic tracking-tighter">NetPusula</h1>
            <p class="text-blue-500 font-bold uppercase text-xs tracking-[0.3em]">Hızını Ölç, Geleceğini Gör</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
            <div class="lg:col-span-1 glass-effect p-6 rounded-[2.5rem]">
                <h3 class="text-xl font-bold mb-4 italic text-white italic">📍 Adres Sorgu</h3>
                <div class="space-y-3">
                    <select id="il" onchange="ilceGetir()" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">İl Seçiniz</option>
                        <option value="34">İstanbul</option>
                        <option value="06">Ankara</option>
                    </select>
                    <select id="ilce" disabled class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none disabled:opacity-30">
                        <option value="">İlçe Seçin</option>
                    </select>
                    <button onclick="sorgula()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all shadow-lg uppercase text-xs">Sorgula</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-effect p-4 rounded-[2.5rem]">
                <div id="map" class="w-full h-[350px]"></div>
            </div>
        </div>

        <div class="glass-effect p-2 rounded-[3rem] mb-12 border-t border-blue-500/20 overflow-hidden shadow-2xl">
            <div class="text-center py-4">
                <h3 class="text-2xl font-black italic text-white flex justify-center items-center">
                    <i class="fas fa-tachometer-alt mr-3 text-blue-500"></i> CANLI HIZ TESTİ
                </h3>
            </div>
            <iframe class="speedtest-frame" src="https://openspeedtest.com/speedtest" allow="geolocation"></iframe>
        </div>

    </div>

    <script>
        // --- Harita Başlatma ---
        var map = L.map('map', { zoomControl: false }).setView([39.0, 35.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // --- Türkiye İllerini Çizme (GeoJSON) ---
        fetch('https://raw.githubusercontent.com/cihad/tr-iller-geojson/master/tr-iller.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#334155", weight: 1, fillColor: "#1e293b", fillOpacity: 0.6 },
                    onEachFeature: function(feature, layer) {
                        layer.on('mouseover', function() { this.setStyle({ fillColor: "#3b82f6", fillOpacity: 0.8 }); });
                        layer.on('mouseout', function() { this.setStyle({ fillColor: "#1e293b", fillOpacity: 0.6 }); });
                        layer.on('click', function() { 
                            map.fitBounds(layer.getBounds());
                            alert(feature.properties.name + " altyapı verileri yükleniyor...");
                        });
                    }
                }).addTo(map);
            });

        function ilceGetir() {
            document.getElementById('ilce').disabled = false;
            document.getElementById('ilce').innerHTML = '<option value="1">Kadıköy</option><option value="2">Çankaya</option>';
        }

        function sorgula() {
            alert("Sorgu sonucu aşağıya eklendi kanki!");
        }
    </script>
</body>
</html>
