<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPusula | Altyapı Sorgu Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-effect { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .select-style { @apply bg-slate-800 border border-slate-600 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm outline-none transition-all disabled:opacity-30; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans min-h-screen">

    <div class="max-w-5xl mx-auto pt-12 px-4 pb-20">
        <header class="text-center mb-10">
            <div class="inline-block p-2 px-4 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold mb-4 uppercase tracking-widest">
                İnsanlığın Hayrına Ücretsiz Servis
            </div>
            <h1 class="text-6xl font-black text-white mb-3 tracking-tighter italic italic">NetPusula</h1>
            <p class="text-slate-400 text-lg">Adresini seç, tüm operatörlerin altyapı hızını anında gör.</p>
        </header>

        <div class="glass-effect p-6 md:p-10 rounded-[2rem] shadow-2xl mb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 ml-1">ŞEHİR</label>
                    <select id="il" onchange="ilceGetir()" class="bg-slate-800 border border-slate-600 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm outline-none">
                        <option value="">İl Seçiniz</option>
                        <option value="34">İstanbul</option>
                        <option value="06">Ankara</option>
                        <option value="35">İzmir</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 ml-1">İLÇE</label>
                    <select id="ilce" onchange="mahalleGetir()" disabled class="bg-slate-800 border border-slate-600 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm outline-none disabled:opacity-30">
                        <option value="">Önce İl Seçin</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 ml-1">MAHALLE</label>
                    <select id="mahalle" onchange="binaGetir()" disabled class="bg-slate-800 border border-slate-600 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm outline-none disabled:opacity-30">
                        <option value="">Önce İlçe Seçin</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 ml-1">BİNA NO</label>
                    <select id="bina" onchange="daireGetir()" disabled class="bg-slate-800 border border-slate-600 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm outline-none disabled:opacity-30">
                        <option value="">Önce Mahalle Seçin</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 ml-1">DAİRE NO</label>
                    <select id="daire" disabled class="bg-slate-800 border border-slate-600 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm outline-none disabled:opacity-30">
                        <option value="">Önce Bina Seçin</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2 justify-end">
                    <button onclick="sorgula()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/20 uppercase tracking-wider">
                        Altyapı Sorgula
                    </button>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-10 animate-pulse">
            <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-blue-400 font-bold tracking-widest uppercase text-xs">Sinyal Gönderiliyor...</p>
        </div>

        <div id="sonucAlani" class="hidden animate-fade">
            <div class="overflow-x-auto rounded-3xl border border-slate-800 shadow-2xl">
                <table class="w-full text-left bg-slate-900/50 backdrop-blur-md">
                    <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em]">
                        <tr>
                            <th class="p-6">İnternet Servis Sağlayıcı</th>
                            <th class="p-6">Hız Kapasitesi</th>
                            <th class="p-6">Altyapı Türü</th>
                            <th class="p-6">Port</th>
                            <th class="p-6">Aksiyon</th>
                        </tr>
                    </thead>
                    <tbody id="tabloGövde" class="divide-y divide-slate-800">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Kanki, buradaki fonksiyonlar şimdilik bir sonraki kutuyu açıyor. 
        // Python tarafında API'leri bağladığımızda buralar dolacak.
        function ilceGetir() {
            const ilce = document.getElementById('ilce');
            ilce.disabled = false;
            ilce.innerHTML = '<option value="1">Merkez</option><option value="2">Kadıköy</option><option value="3">Çankaya</option>';
        }

        function mahalleGetir() {
            const mahalle = document.getElementById('mahalle');
            mahalle.disabled = false;
            mahalle.innerHTML = '<option value="101">Atatürk Mah.</option><option value="102">Cumhuriyet Mah.</option>';
        }

        function binaGetir() {
            document.getElementById('bina').disabled = false;
            document.getElementById('bina').innerHTML = '<option value="5">No: 5</option><option value="12">No: 12</option>';
        }

        function daireGetir() {
            document.getElementById('daire').disabled = false;
            document.getElementById('daire').innerHTML = '<option value="1">Daire: 1</option><option value="2">Daire: 2</option>';
        }

        async function sorgula() {
            const loader = document.getElementById('loader');
            const sonucAlani = document.getElementById('sonucAlani');
            const tablo = document.getElementById('tabloGövde');

            loader.classList.remove('hidden');
            sonucAlani.classList.add('hidden');

            try {
                // Deneme amaçlı BBK 12345 gönderiyoruz
                const response = await fetch('/sorgula/12345');
                const veriler = await response.json();

                tablo.innerHTML = veriler.map(v => `
                    <tr class="hover:bg-blue-500/5 transition-colors border-l-4 border-transparent hover:border-blue-500">
                        <td class="p-6">
                            <div class="font-black text-white text-lg">${v.iss}</div>
                            <div class="text-[10px] text-slate-500 uppercase tracking-tighter">Resmi Altyapı</div>
                        </td>
                        <td class="p-6">
                            <span class="text-2xl font-black text-blue-400">${v.hiz}</span>
                        </td>
                        <td class="p-6">
                            <span class="px-3 py-1 bg-slate-800 rounded-lg text-xs font-bold border border-slate-700">${v.tur}</span>
                        </td>
                        <td class="p-6">
                            <div class="flex items-center text-green-400 text-xs font-bold">
                                <span class="w-2 h-2 bg-green-500 rounded-full mr-2 shadow-[0_0_10px_rgba(34,197,94,0.5)]"></span>
                                AKTİF
                            </div>
                        </td>
                        <td class="p-6 text-right">
                            <a href="${v.link}" class="bg-white text-black text-xs font-black px-5 py-2.5 rounded-xl hover:bg-blue-500 hover:text-white transition-all">
                                BAŞVUR
                            </a>
                        </td>
                    </tr>
                `).join('');

                setTimeout(() => {
                    loader.classList.add('hidden');
                    sonucAlani.classList.remove('hidden');
                }, 800);

            } catch (error) {
                alert("Hata oluştu kanki!");
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
