<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPusula | Altyapı Sorgulama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

    <div class="max-w-4xl mx-auto pt-16 px-6">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tighter italic">NetPusula</h1>
            <p class="text-slate-400 text-lg">İnsanlığın Hayrına: Tüm Altyapılar Tek Sorguda.</p>
        </header>

        <div class="glass p-8 rounded-3xl shadow-2xl border border-slate-700 mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <input id="bbkInput" type="text" placeholder="Bina Kodunuzu (BBK) girin..." 
                       class="flex-1 bg-slate-800 border border-slate-600 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                <button onclick="sorgula()" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-2xl font-bold transition-all transform hover:scale-105 shadow-lg">
                    SORGULA
                </button>
            </div>
            <p class="text-xs text-slate-500 mt-4 text-center">Not: Şimdilik test aşamasında herhangi bir sayı girip sonucu görebilirsin kanki.</p>
        </div>

        <div id="loader" class="hidden text-center my-10">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500 border-r-transparent"></div>
            <p class="mt-4 text-blue-400 font-medium">Operatörlere sinyal gönderiliyor...</p>
        </div>

        <div id="sonucAlani" class="hidden animate-fade-in">
