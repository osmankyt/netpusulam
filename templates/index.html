<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPusula | Akıllı Altyapı Haritası</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .glass-effect { background: rgba(15, 23, 42, 0.90); backdrop-filter: blur(15px); border: 1px solid rgba(51, 65, 85, 0.5); }
        #map { border-radius: 2rem; background: #0b1120; height: 500px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .info-box { background: rgba(15, 23, 42, 0.95); border: 1px solid #3b82f6; color: white; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto pt-6 px-4">
        <header class="text-center mb-6">
            <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase">NetPusula</h1>
            <div class="flex justify-center gap-4 mt-4">
                <button onclick="tabAc('altyapi')" class="px-6 py-2 rounded-xl glass-effect text-sm font-bold tab-active" id="btn-altyapi">HARİTA & SORGU</button>
                <button onclick="tabAc('hiztesti')" class="px-6 py-2 rounded-xl glass-effect text-sm font-bold" id="btn-hiztesti">HIZ TESTİ</button>
            </div>
        </header>

        <div id="tab-altyapi" class="space-y-6">
            <div class="glass-effect p-4 rounded-[2.5rem] relative">
                <div class="absolute top-8 left-8 z-[1000] glass-effect p-4 rounded-2xl hidden md:block border-blue-500/50">
                    <h4 class="text-xs font-black text-blue-400 uppercase italic">Harita Rehberi</h4>
                    <p class="text-[10px] text-slate-400">🔍 İle tıkla, ilçeleri gör.</p>
                    <p class="text-[10px] text-slate-400">🖱️ Üzerinde gez, oranları gör.</p>
                </div>
                
                <div id="map"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 glass-effect p-6 rounded-[2rem]">
                <select id="il" onchange="ilceGetir()" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 outline-none"><option value="">İl</option><option value="34">İstanbul</option></select>
                <select id="ilce" onchange="mahalleGetir()" disabled class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 opacity-50"><option value="">İlçe</option></select>
                <select id="mahalle" disabled class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 opacity-50"><option value="">Mahalle</option></select>
                <button onclick="sorgula()" class="bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl text-xs py-3 uppercase">Sorgula</button>
            </div>
        </div>

        <div id="tab-hiztesti" class="hidden">
            <div class="glass-effect p-2 rounded-[2.5rem] overflow-hidden">
                <iframe src="https://openspeedtest.com/speedtest" style="width:100%; height:600px; border:none; border-radius:2rem;"></iframe>
            </div>
        </div>
    </div>

    <script>
        // --- HARİTA AYARLARI ---
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.0, 35.5], 6);
        
        // Koyu Tema Harita Katmanı
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // ÖRNEK VERİLER (Kanki bunları sonra Python'dan (JSON) çekeceğiz)
        const veriTabani = {
            "İstanbul": { fiber: "%88", vdsl: "%94", renk: "#3b82f6" },
            "Ankara": { fiber: "%72", vdsl: "%85", renk: "#10b981" },
            "İzmir": { fiber: "%65", vdsl: "%80", renk: "#f59e0b" }
        };

        // --- İLLERİ YÜKLE ---
        fetch('https://raw.githubusercontent.com/cihad/tr-iller-geojson/master/tr-iller.json')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: function(feature) {
                    return { color: "#1e293b", weight: 1.5, fillColor: "#1e293b", fillOpacity: 0.7 };
                },
                onEachFeature: function(feature, layer) {
                    let ilAdi = feature.properties.name;
                    let istatistik = veriTabani[ilAdi] || { fiber: "%--", vdsl: "%--" };

                    // Fare Üzerine Gelince
                    layer.on('mouseover', function(e) {
                        this.setStyle({ fillColor: "#3b82f6", fillOpacity: 0.9, color: "#fff" });
                        
                        // TOOLTIP (Değerleri gösteren kutu)
                        let popupHtml = `
                            <div class="info-box">
                                <p class="text-blue-400 mb-1">${ilAdi.toUpperCase()}</p>
                                <p>📶 Fiber: <span class="text-white">${istatistik.fiber}</span></p>
                                <p>⚡ VDSL: <span class="text-white">${istatistik.vdsl}</span></p>
                            </div>
                        `;
                        layer.bindTooltip(popupHtml, { sticky: true, direction: 'top', className: 'custom-tooltip' }).openTooltip();
                    });

                    // Fare Çıkınca
                    layer.on('mouseout', function() {
                        this.setStyle({ fillColor: "#1e293b", fillOpacity: 0.7, color: "#1e293b" });
                    });

                    // Tıklayınca (Zoom ve İlçe Modu)
                    layer.on('click', function() {
                        map.fitBounds(layer.getBounds());
                        // Buraya ileride ilçe GeoJSON dosyasını yükleme kodu gelecek
                        console.log(ilAdi + " ilçeleri yükleniyor...");
                    });
                }
            }).addTo(map);
        });

        // --- FONKSİYONLAR ---
        function tabAc(id) {
            document.getElementById('tab-altyapi').classList.add('hidden');
            document.getElementById('tab-hiztesti').classList.add('hidden');
            document.getElementById('btn-altyapi').classList.remove('tab-active');
            document.getElementById('btn-hiztesti').classList.remove('tab-active');
            
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('tab-active');
            if(id === 'altyapi') { setTimeout(() => { map.invalidateSize(); }, 200); }
        }

        function ilceGetir() { document.getElementById('ilce').disabled = false; document.getElementById('ilce').classList.remove('opacity-50'); }
        function mahalleGetir() { document.getElementById('mahalle').disabled = false; document.getElementById('mahalle').classList.remove('opacity-50'); }
        function sorgula() { alert("Detaylı altyapı raporu hazırlanıyor..."); }
    </script>
</body>
</html>
